# ============================================================================
#   模型定义配置文件
# ============================================================================
#
# 本文件用于定义项目中所有的 SQLAlchemy 数据模型和 Pydantic 请求/响应模型。
# 代码生成器会根据此配置文件自动生成：
#   - SQLAlchemy ORM 模型 (shared/models/*.py)
#   - FastAPI 路由 (src/api/v1/generated/generated_router.py)（废弃的特性）
#   - TypeScript 类型定义 (frontend-next/types/generated/api-types.ts)
#   - TypeScript API 客户端 (frontend-next/types/generated/api-client.ts)
#
# 使用方法：
#   1. 在此文件中添加或修改模型定义
#   2. 运行命令: python scripts/generate_routes.py generate-all
#   3. 生成的代码会自动保存到对应目录
#
# 模型配置说明：
#   - orm: true          # 标记为 ORM 模型，会生成 SQLAlchemy 模型文件
#   - table: xxx         # 指定数据库表名
#   - def_list: [...]    # 自定义方法列表（在 shared/defs/<model>_defs.py 中定义）
#   - defs_target: xxx   # 自定义方法文件名（相对于 shared/defs/）
#   - properties:        # 模型属性定义
#       field_name:
#         type: string   # 数据类型 (string, integer, boolean, text, datetime等)
#         description:   # 字段描述
#         maxLength:     # 最大长度（字符串类型）
#         nullable:      # 是否可为空
#         default:       # 默认值
#         unique:        # 是否唯一
#         foreignKey:    # 外键引用（引用其他模型的名称）
#         enum: []       # 枚举值列表
#         format:        # 格式（如 email, date-time）
#         index: true    # 是否创建索引
#   - unlogged: false     # 是否为 PostgreSQL UNLOGGED 表（不启用 WAL，性能更高，但崩溃时可能丢失数据）
#
# 注意事项：
#   - 请勿手动修改自动生成的模型文件（文件头部有注释标识）
#   - 自定义方法应放在 shared/defs/ 目录下的对应文件中
#   - 修改配置后需要重新运行代码生成器
#   - 数据库迁移需要单独执行（建议使用 Alembic）
#
# ============================================================================

models:
  AuditLog:
    description: 操作审计日志模型
    status: active
    frontend_page: /admin/audit-logs
    properties:
      id:
        type: bigint
        description: 日志 ID
      user_id:
        type: bigint
        nullable: true
        description: 操作用户 ID
        foreignKey: User
      action:
        type: string
        maxLength: 100
        description: '操作动作 (如 create_article, update_settings)'
      resource_type:
        type: string
        maxLength: 50
        nullable: true
        description: '资源类型 (如 Article, User)'
      resource_id:
        type: bigint
        nullable: true
        description: 资源 ID
      ip_address:
        type: string
        maxLength: 45
        nullable: true
        description: 操作 IP 地址
      user_agent:
        type: text
        nullable: true
        description: 用户代理字符串
      request_data:
        type: text
        nullable: true
        description: 请求数据快照 (JSON)
      status:
        type: string
        maxLength: 20
        default: success
        description: 操作状态 (success, failure)
      error_message:
        type: text
        nullable: true
        description: 错误信息
      created_at:
        type: string
        format: date-time
        description: 创建时间
    orm: true
    table: audit_logs
    indexes:
      - name: idx_audit_logs_user_id
        columns:
          - user_id
        comment: 用户操作查询索引
      - name: idx_audit_logs_action
        columns:
          - action
        comment: 动作类型查询索引
      - name: idx_audit_logs_created_at
        columns:
          - created_at
        order: DESC
        comment: 时间排序索引
      - name: idx_audit_logs_resource
        columns:
          - resource_type
          - resource_id
        comment: 资源操作追踪索引
