          - -1
          - 0
          - 1
        description: 状态(-1:已删除，0:草稿，1:已发布)
      hidden:
        type: boolean
        default: false
        description: 是否隐藏
      is_featured:
        type: boolean
        default: false
        description: 是否推荐
      is_vip_only:
        type: boolean
        default: false
        description: 是否仅 VIP 可见
      required_vip_level:
        type: integer
        default: 0
        description: 所需 VIP 等级
      article_ad:
        type: string
        nullable: true
        description: 广告内容
      scheduled_publish_at:
        type: string
        format: date-time
        nullable: true
        description: 定时发布时间（设置为未来时间后自动发布）
      post_type:
        type: string
        maxLength: 50
        default: article
        description: 内容类型(article/book/product等)
        index: true
      is_sticky:
        type: boolean
        default: false
        description: 是否置顶（粘性文章）
        index: true
      sticky_until:
        type: string
        format: date-time
        nullable: true
        description: 置顶过期时间（可选，过期后自动取消置顶）
      sort_order:
        type: bigint
        default: 0
        description: 排序顺序（用于拖拽排序）
        index: true
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    table: articles
    indexes:
      - name: idx_articles_status
        columns:
          - status
      - name: idx_articles_category
        columns:
          - category
      - name: idx_articles_user_id
        columns:
          - user
      - name: idx_articles_created_at
        columns:
          - created_at
        order: DESC
      - name: idx_articles_scheduled_publish
        columns:
          - scheduled_publish_at
      - name: idx_articles_status_created
        columns:
          - status
          - created_at
        order: DESC
      - name: idx_articles_is_sticky
        columns:
          - is_sticky
      - name: idx_articles_sticky_until
        columns:
          - sticky_until
      - name: idx_articles_published_at
        columns:
          - created_at
        order: DESC
        comment: 文章发布时间索引（用于最新文章查询）
      - name: idx_articles_status_featured
        columns:
          - status
          - is_featured
        comment: 推荐文章查询索引
      - name: idx_articles_status_views
        columns:
          - status
          - views
        order: DESC
        comment: 热门文章查询索引
      - name: idx_articles_slug
        columns:
          - slug
        unique: true
        comment: 文章slug唯一索引
      - name: idx_articles_post_type_status
        columns:
          - post_type
          - status
        comment: 按类型和状态查询索引
      - name: idx_articles_category_status_created
        columns:
          - category
          - status
          - created_at
        order: DESC
        comment: 分类文章列表查询索引
      - name: idx_articles_user_status_created
        columns:
          - user
          - status
          - created_at
        order: DESC
        comment: 用户文章列表查询索引
    orm: true
    relationships:
      revisions:
        target: ArticleRevision
        back_populates: article
        primaryjoin: Article.id == ArticleRevision.article_id
      seo_data:
        target: ArticleSEO
        back_populates: article
        primaryjoin: Article.id == ArticleSEO.article_id
        uselist: false
