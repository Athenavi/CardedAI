      title:
        type: string
        maxLength: 255
        description: 标题
      slug:
        type: string
        maxLength: 255
        description: 文章 slug
      excerpt:
        type: string
        nullable: true
        description: 摘要
      cover_image:
        type: string
        nullable: true
        description: 封面图 URL
      category:
